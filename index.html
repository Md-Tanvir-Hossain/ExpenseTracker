<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Personal Expense Tracker </title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="header">
            <h1>Good Morning, Tanvir </h1>

            <div class="header-controls">

                <div class="dropdown">
                    Daily
                    <i class="fas fa-chevron-down"></i>
                </div>

                <div class="date-picker">
                    <i class="fas fa-calendar"></i> 16 June 2024
                </div>

                <div class="export-btn">
                    <i class="fas fa-download"></i>
                    Export
                </div>


            </div>
        </div>


        <div class="main-content">

            <div class="dashboard-grid">

                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title"> Monthly Income </h3>
                        <button class="card-menu"><i class="fas fa-ellipsis-h"> </i></button>
                    </div>

                    <div class="amount income-amount">$5,000.00</div>

                    <div class="change">
                        <i class="fas fa-arrow-up"></i>
                        5% increase
                    </div>
                </div>



                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title"> Monthly Expenses </h3>
                        <button class="card-menu"><i class="fas fa-ellipsis-h"> </i></button>
                    </div>

                    <div class="amount income-amount">$1,000.00</div>

                    <div class="change">
                        <i class="fas fa-arrow-up"></i>
                        5% increase
                    </div>
                </div>




                <div class="card my-card">

                    <div class="card-header">
                        <h3 class="card-title">My Card</h3>
                        <button class="card-menu" style="color: azure;"><i class="fas fa-ellipsis-h"> </i></button>
                    </div>

                    <div style=" font-size:0.75rem; opacity:0.8; margin-bottom:1rem;">
                        Link to your primary wallet

                    </div>

                    <div class="card-chip"></div>
                    <div class="card-number"> 5453 5675 2987 3255</div>
                    <div class="card-holder">Tanvir</div>

                    <div class="card-logo">
                        <div class="card-logo-circle logo-red"></div>
                        <div class="card-logo-circle logo-orange"></div>
                    </div>

                    <div class="spending-saction">
                        <div style=" font-size:0.875rem; opacity:0.9; margin-bottom:0.5rem;">
                            Spending Limit
                            <div class="spending-limit"> $50000</div>
                            <div class="spending-used"> Used from $20000</div>
                            <div class="progress-bar">
                                <div class="progress-fill"></div>
                            </div>


                        </div>
                    </div>

                </div>



            </div>
        </div>






        <script src="script.js"></script>
    </body>

</html>
